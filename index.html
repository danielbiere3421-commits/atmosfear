<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosfear – Le Seigneur des Clés</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0514;
            background-image: radial-gradient(circle at 20% 30%, #1c0a30 0%, #08041a 90%);
            color: #e0d7c6;
            font-family: 'Special Elite', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-family: 'Creepster', cursive;
            font-size: 3rem;
            color: #9b30ff;
            text-shadow: 0 0 15px #9b30ff, 0 0 30px #4b0082;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }
        .subtitle { font-size: 1.2rem; color: #b0a0c0; margin-bottom: 10px; font-style: italic; }
        .chrono-note {
            background: #1c1c2a; border: 1px dashed #9b30ff; border-radius: 8px;
            padding: 8px 15px; margin-bottom: 25px; font-size: 0.95rem; color: #c0b0e0;
        }
        .selector { display: flex; justify-content: center; gap: 20px; margin: 25px 0; flex-wrap: wrap; }
        .selector label {
            background: #1c1c2a; border: 2px solid #444; border-radius: 12px;
            padding: 12px 25px; cursor: pointer; transition: all 0.3s; font-size: 1.1rem;
            color: #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.6);
        }
        .selector input[type="radio"] { display: none; }
        .selector input[type="radio"]:checked + span { color: #fff; font-weight: bold; }
        .selector label:has(input:checked) {
            background: #2a0033; border-color: #9b30ff; box-shadow: 0 0 20px #9b30ff80; color: #fff;
        }
        .draw-btn {
            background: #6a0dad; border: none; border-radius: 50px; padding: 18px 40px;
            font-family: 'Creepster', cursive; font-size: 1.8rem; color: #fff; cursor: pointer;
            letter-spacing: 2px; box-shadow: 0 0 25px #9b30ff80; transition: transform 0.2s, box-shadow 0.2s;
            margin: 25px 0;
        }
        .draw-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px #b266ff; }
        .draw-btn:active { transform: scale(0.98); }
        .card-display {
            min-height: 200px; width: 90%; max-width: 550px; margin: 30px auto 10px;
            background: #1c1c2a; border: 3px solid #9b30ff; border-radius: 20px;
            padding: 25px; box-shadow: 0 0 40px rgba(155,48,255,0.4), inset 0 0 20px #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.4s;
        }
        .card-type {
            font-family: 'Creepster', cursive; font-size: 2rem; color: #9b30ff;
            text-shadow: 0 0 15px #9b30ff; margin-bottom: 10px;
        }
        .card-minute { font-size: 1.8rem; font-weight: bold; color: #d4af37; margin-bottom: 15px; }
        .card-text { font-size: 1.3rem; line-height: 1.6; color: #f0e6d2; margin-bottom: 10px; }
        .empty-message { color: #888; font-style: italic; font-size: 1.5rem; }
        .coin-btn, .hide-btn {
            background: #333; border: 1px solid #9b30ff; border-radius: 30px;
            padding: 10px 20px; font-family: 'Special Elite', cursive; font-size: 1rem;
            color: #ddd; cursor: pointer; transition: background 0.3s, box-shadow 0.3s; margin: 10px 5px;
        }
        .coin-btn:hover, .hide-btn:hover {
            background: #6a0dad; border-color: #9b30ff; box-shadow: 0 0 15px #9b30ff80; color: #fff;
        }
        .result-text { font-weight: bold; color: #d4af37; margin-top: 5px; }
        .counters { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .counter {
            background: #111; border: 1px solid #444; border-radius: 12px;
            padding: 12px 25px; font-size: 1.2rem; box-shadow: 0 0 10px rgba(0,0,0,0.7);
        }
        .counter span { font-weight: bold; color: #d4af37; }
        .reset-buttons { display: flex; gap: 20px; margin-top: 25px; flex-wrap: wrap; justify-content: center; }
        .reset-btn {
            background: #333; border: 1px solid #666; border-radius: 30px;
            padding: 12px 25px; font-family: 'Special Elite', cursive; font-size: 1rem;
            color: #ddd; cursor: pointer; transition: background 0.3s;
        }
        .reset-btn:hover {
            background: #6a0dad; border-color: #9b30ff; box-shadow: 0 0 15px #9b30ff80; color: #fff;
        }
        .footer { margin-top: 40px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>Atmosfear</h1>
    <div class="subtitle">Le Seigneur des Clés – Pioche Interdite</div>
    <div class="chrono-note">⏱️ Le temps s'écoule de 0 à 60 min. Piochez une carte <strong>Temps</strong> quand le chrono atteint la minute indiquée.</div>

    <div class="selector">
        <label><input type="radio" name="cardType" value="temps" checked><span>⏳ Temps</span></label>
        <label><input type="radio" name="cardType" value="chance"><span>🎲 Chance</span></label>
        <label><input type="radio" name="cardType" value="destin"><span>📜 Destin</span></label>
    </div>

    <button class="draw-btn" id="drawButton">🔑 Piocher</button>

    <div class="card-display" id="cardDisplay">
        <div class="card-text">Choisissez un type et piochez...</div>
    </div>

    <div id="actionArea" style="text-align:center;"></div>

    <div class="counters">
        <div class="counter">⏳ Temps : <span id="countTemps">35</span>/35</div>
        <div class="counter">🎲 Chance : <span id="countChance">35</span>/35</div>
        <div class="counter">📜 Destin : <span id="countDestin">35</span>/35</div>
    </div>

    <div class="reset-buttons">
        <button class="reset-btn" id="resetCurrent">🔄 Réinitialiser la pile actuelle</button>
        <button class="reset-btn" id="resetAll">💀 Réinitialiser toutes les piles</button>
    </div>

    <div class="footer">Atmosphère, cris et clés perdues garantis.</div>

    <script>
        // =================== CARTES TEMPS (minutes 0 à 60) ===================
        const tempsCards = [
            // ---------- Minutes 0 à 40 : récompenses en TOURS ----------
            { minute: "0", text: "Défi : Criez le plus fort possible. Si quelqu’un sursaute, gagnez 1 tour." },
            { minute: "1", text: "Défi : Lisez le parchemin d’intro. Tous gagnent 1 tour. Vous gagnez 1 tour supplémentaire." },
            { minute: "2", text: "Défi : Frappez trois coups sous la table. Le dernier à regarder perd 1 tour, vous gagnez 2 tours." },
            { minute: "4", text: "Défi : Fixez quelqu’un sans parler. Le premier qui parle ou détourne les yeux vous donne 1 tour." },
            { minute: "6", text: "Défi : Lancez un dé et mimez le Seigneur. Si quelqu’un éclate de rire, gagnez 2 tours." },
            { minute: "8", text: "Défi : Silence de mort jusqu’à la prochaine carte Temps. Si personne ne parle, gagnez 2 tours. Un contrevenant vous fait perdre 1 tour." },
            { minute: "10", text: "Défi : Tapez dans vos mains. Tous doivent imiter. Le plus lent vous donne 1 tour." },
            { minute: "12", text: "Défi : Parlez avec une voix de monstre pendant 2 min. Chaque oubli vous fait perdre 1 tour. Si vous tenez, gagnez 3 tours." },
            { minute: "14", text: "Défi : Le joueur le plus proche de la cuisine gagne 2 tours (vous compris). Si c’est vous, gagnez 3 tours." },
            { minute: "16", text: "Défi : Levez-vous. Le dernier debout perd 2 tours. Si vous restez debout, gagnez 2 tours." },
            { minute: "18", text: "Défi : Éteignez la lumière 1 min. Si quelqu’un rallume avant, il perd 3 tours et vous gagnez 2 tours." },
            { minute: "20", text: "Défi : Yeux fermés, désignez un traître. Ce joueur perd 2 tours. Si le groupe valide, gagnez 3 tours." },
            { minute: "22", text: "Défi : Chaise musicale. Vous restez assis. Le dernier assis perd 2 tours, vous gagnez 2 tours." },
            { minute: "24", text: "Défi : Cachez un objet dans une main. Les autres pointent. Chaque erreur vous rapporte 1 tour." },
            { minute: "26", text: "Défi : Tous ferment les yeux, vous vous déplacez sans bruit. Le premier à vous localiser gagne 1 tour (pas vous)." },
            { minute: "28", text: "Défi : Pause figée. Tous immobiles. Le premier qui bouge perd 2 tours. Vous gagnez 2 tours s’il y a un fautif." },
            { minute: "30", text: "Défi : Inversez le sens du jeu. Si la majorité l’accepte, gagnez 2 tours. Sinon, perdez 1 tour." },
            { minute: "32", text: "Défi : Votez pour le joueur le plus silencieux. Si c’est vous, gagnez 3 tours. Sinon, gagnez 1 tour." },
            { minute: "34", text: "Défi : Frappez à la fenêtre. Tout le monde doit se figer 5 sec. Ceux qui bougent perdent 1 tour, vous gagnez 1 tour." },
            { minute: "36", text: "Défi : Faites passer un objet jusqu’à la minute 39. Le détenteur à 39 perd 2 tours, vous gagnez 2 tours." },
            { minute: "38", text: "Défi : Criez une phrase terrifiante. Si personne ne rit, gagnez 2 tours. Si on rit, reculez de 3 cases." },
            { minute: "40", text: "Défi : Sautez à cloche-pied 10 secondes. Réussi : gagnez 2 tours. Échec : perdez 1 tour." },

            // ---------- Minutes 41 à 60 : récompenses en CLÉS ----------
            { minute: "41", text: "Défi : Imitez le cri du Seigneur. Vote : si vous êtes le plus effrayant, gagnez 3 Clés." },
            { minute: "43", text: "Défi : Racontez une blague qui fait rire au moins 2 joueurs. Récompense : 2 Clés. Échec : perdez 1 Clé." },
            { minute: "45", text: "Défi : Comptez de 10 à 1 sans erreur. Si personne ne se trompe (vous y compris), gagnez 2 Clés. Si vous vous trompez, perdez 1 Clé." },
            { minute: "47", text: "Défi : Dites « Je suis le maître des clés ». Les autres répondent « Oui maître ». Le dernier perd 1 Clé, vous gagnez 1 Clé." },
            { minute: "49", text: "Défi : Fermez les yeux, comptez 10 sec. Les autres cachent un objet. Retrouvez-le en 30 sec. Succès : 3 Clés. Échec : -2 Clés." },
            { minute: "51", text: "Défi : Lancez deux dés. Si vous faites un double, gagnez 2 Clés. Sinon, perdez 1 Clé." },
            { minute: "53", text: "Défi : Avancez votre pion à la case de sortie la plus proche. Vous gagnez 1 Clé, mais donnez 1 Clé au joueur le plus éloigné." },
            { minute: "55", text: "Défi : Lisez cette carte à voix basse. Celui qui dit « Quoi ? » vous donne 2 Clés." },
            { minute: "56", text: "Défi : Criez tous ensemble. Si un voisin réagit, vous gagnez 3 Clés, les autres perdent 1 Clé." },
            { minute: "57", text: "Défi : Désignez un joueur qui doit ramper vers vous. S’il refuse, il va en prison et vous gagnez 2 Clés." },
            { minute: "58", text: "Défi : Regardez fixement les autres d’un air menaçant. Le premier à sourire perd 2 Clés, vous gagnez 2 Clés." },
            { minute: "59", text: "Défi : Comptez à rebours 10→1 en groupe. Si personne ne se trompe, gagnez 3 Clés. Sinon, perdez 1 Clé." },
            { minute: "60", text: "Apparition du Seigneur ! Tous les joueurs perdent 2 Clés, sauf ceux dans la Vraie Commune." }
        ];

        const chanceCards = [
            { text: "Avancez de 4 cases." },
            { text: "Reculez de 4 cases." },
            { text: "Lancez deux dés ce tour, choisissez le meilleur." },
            { text: "Lancez un dé : pair = avancez d’autant, impair = reculez." },
            { text: "Téléportez-vous sur n’importe quelle case libre et gagnez 1 Clé." },
            { text: "Votre prochain déplacement se fait en arrière." },
            { text: "Gagnez 2 Clés." },
            { text: "Perdez 2 Clés." },
            { text: "Piochez une carte Destin et subissez-en les effets." },
            { text: "Ignorez le prochain obstacle (porte fermée, piège)." },
            { text: "Empruntez 2 Clés à la banque. Remboursez-en 3 à la prochaine carte Temps." },
            { text: "Avancez de 1d6 cases supplémentaires." },
            { text: "Protection : annulez une carte Destin qui vous vise." },
            { text: "Choisissez la valeur de votre prochain dé (1 à 6)." },
            { text: "Défi chanceux : sautez à cloche-pied 10 secondes. Si réussi, gagnez 2 Clés." },
            { text: "Regardez les 3 premières cartes Chance, prenez-en une." },
            { text: "Perdez 1 tour." },
            { text: "Gagnez 1 tour supplémentaire." },
            { text: "Mystère : lancez un dé, sur 6 gagnez 6 Clés, sinon perdez le résultat." },
            { text: "Soif de savoir : piochez une carte Destin. Si c’est un bonus, doublez-le." },
            { text: "Case rouge maudite : le prochain joueur qui passe sur une case rouge recule de 4." },
            { text: "Saut de grenouille : dépassez le joueur devant vous." },
            { text: "Carte sortie de prison (gardez-la)." },
            { text: "Changez de direction : reculez de 3 cases maintenant." },
            { text: "Donnez 2 Clés à la banque pour en recevoir 4 au prochain tour." },
            { text: "Boost : avancez du double du dé ce tour." },
            { text: "Freinage : tous les autres reculent de 1 case." },
            { text: "Sacrifiez 1 Clé pour piocher 3 cartes Chance." },
            { text: "Aubaine : gagnez 1 Clé et avancez de 2 cases." },
            { text: "Malchance : perdez 1 Clé et reculez de 2 cases." },
            { text: "Événement : le Seigneur gronde, avancez son pion de 2 cases." },
            { text: "Rituel : gagnez 2 Clés si vous êtes le seul à fermer les yeux." },
            { text: "Offrande : sacrifiez un tour pour gagner 3 Clés." },
            { text: "Retournement : votre prochain déplacement sera à l’envers." },
            { text: "Jackpot : si vous avez exactement 6 Clés, doublez-les." }
        ];

        const destinCards = [
            { pile: "Pile : perdez 2 Clés.", face: "Face : perdez 4 Clés." },
            { pile: "Pile : gagnez 2 Clés.", face: "Face : avancez de 2 cases." },
            { pile: "Pile : allez en prison.", face: "Face : libérez un prisonnier (ou gagnez 1 Clé)." },
            { pile: "Pile : reculez de 3 cases.", face: "Face : avancez de 3 cases." },
            { pile: "Pile : le Seigneur attaque (-1 Clé).", face: "Face : le Seigneur vous ignore (+1 tour)." },
            { pile: "Pile : perdez la moitié de vos Clés.", face: "Face : doublez vos Clés (max +4)." },
            { pile: "Pile : défaussez une carte Chance.", face: "Face : piochez une carte Chance." },
            { pile: "Pile : donnez 1 Clé à chaque adversaire.", face: "Face : recevez 1 Clé de chaque adversaire." },
            { pile: "Pile : échangez vos Clés avec le plus riche.", face: "Face : échangez avec le plus pauvre." },
            { pile: "Pile : votre prochain déplacement est dicté par la droite.", face: "Face : vous choisissez la direction de tous." },
            { pile: "Pile : jouez le prochain tour à l'envers.", face: "Face : jouez un tour normal mais doublez vos gains." },
            { pile: "Pile : lancez un dé et perdez le résultat en Clés.", face: "Face : lancez un dé et gagnez le résultat en Clés." },
            { pile: "Pile : statue : passez un tour sans bouger.", face: "Face : vitesse : jouez deux tours de suite." },
            { pile: "Pile : murmures : si on vous parle, vous perdez 2 Clés.", face: "Face : éloquence : si on vous parle, gagnez 2 Clés." },
            { pile: "Pile : ruine : défaussez toutes vos Clés sauf une.", face: "Face : trésor : gagnez 3 Clés immédiatement." },
            { pile: "Pile : roue du destin : 1-2 prison, 3-4 reculez 3, 5-6 -2 Clés.", face: "Face : roue de la fortune : 1-2 sortie prison, 3-4 +3 cases, 5-6 +2 Clés." },
            { pile: "Pile : sacrifiez une carte ou perdez 3 Clés.", face: "Face : offrande acceptée : piochez 2 cartes." },
            { pile: "Pile : amnésie : défaussez la moitié de votre main.", face: "Face : mémoire : reprenez une carte défaussée." },
            { pile: "Pile : glissade : avancez de 4 cases sans effets.", face: "Face : escalier : reculez de 4 cases sans effets." },
            { pile: "Pile : trou noir : attirez les pions de 2 cases.", face: "Face : répulsion : éloignez les pions de 2 cases." },
            { pile: "Pile : si quelqu'un parle dans les 5 sec, il perd 3 Clés.", face: "Face : si personne ne parle, vous gagnez 3 Clés." },
            { pile: "Pile : cache-cache : le premier qui baisse les mains perd 3 Clés.", face: "Face : tous ferment les yeux, vous gagnez 2 Clés." },
            { pile: "Pile : prenez la Clé la plus proche.", face: "Face : donnez 1 Clé au joueur le plus éloigné." },
            { pile: "Pile : allez en prison.", face: "Face : restez libre et gagnez 1 Clé." },
            { pile: "Pile : fredonnez, si un autre continue, vous perdez 2 Clés.", face: "Face : chantez, si personne ne suit, gagnez 2 Clés." },
            { pile: "Pile : reculez jusqu'au joueur le plus en retard.", face: "Face : avancez jusqu'au joueur le plus en avance." },
            { pile: "Pile : le prochain interlocuteur vous prend 3 Clés.", face: "Face : le prochain joueur qui vous ignore vous donne 3 Clés." },
            { pile: "Pile : votre prochain dé est divisé par 2.", face: "Face : votre prochain dé est multiplié par 2 (max 6)." },
            { pile: "Pile : jetez une Clé, rampez pour la chercher ou -3 Clés.", face: "Face : recevez une Clé gratuite de la banque." },
            { pile: "Pile : le Seigneur avance de 2 cases vers vous.", face: "Face : le Seigneur recule de 2 cases." },
            { pile: "Pile : pacte : +4 Clés mais piochez un autre Destin.", face: "Face : refus : perdez 2 Clés mais annulez ce Destin." },
            { pile: "Pile : noir total : rieurs perdent 3 Clés.", face: "Face : lumière : tout le monde gagne 1 Clé." },
            { pile: "Pile : vérité : racontez une peur ou allez en prison.", face: "Face : mensonge : inventez une peur, si on vous croit, +2 Clés." }
        ];

        // =================== GESTION DES PILES ===================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let piles = {
            temps: shuffleArray([...tempsCards]),
            chance: shuffleArray([...chanceCards]),
            destin: shuffleArray([...destinCards])
        };

        function updateCounters() {
            document.getElementById('countTemps').textContent = piles.temps.length;
            document.getElementById('countChance').textContent = piles.chance.length;
            document.getElementById('countDestin').textContent = piles.destin.length;
        }

        function resetPile(type) {
            if (type === 'all') {
                piles.temps = shuffleArray([...tempsCards]);
                piles.chance = shuffleArray([...chanceCards]);
                piles.destin = shuffleArray([...destinCards]);
            } else {
                piles[type] = shuffleArray([...eval(type + 'Cards')]);
            }
            updateCounters();
            clearCardDisplay();
        }

        function clearCardDisplay() {
            document.getElementById('cardDisplay').innerHTML = '<div class="card-text">Choisissez un type et piochez...</div>';
            document.getElementById('actionArea').innerHTML = '';
        }

        // =================== PIOCHER ===================
        function drawCard() {
            const selectedType = document.querySelector('input[name="cardType"]:checked').value;
            const pile = piles[selectedType];
            const display = document.getElementById('cardDisplay');
            const actionArea = document.getElementById('actionArea');
            actionArea.innerHTML = '';

            if (pile.length === 0) {
                display.innerHTML = `<div class="empty-message">☠️ Pile ${selectedType} épuisée !<br>Réinitialisez-la.</div>`;
                return;
            }

            const card = pile.pop();
            updateCounters();

            let html = '';
            if (selectedType === 'temps') {
                html += `<div class="card-type">⏳ Carte TEMPS</div>`;
                html += `<div class="card-minute">Minute ${card.minute}</div>`;
                html += `<div class="card-text">${card.text}</div>`;
            } else if (selectedType === 'chance') {
                html += `<div class="card-type">🎲 Carte CHANCE</div>`;
                html += `<div class="card-text">${card.text}</div>`;
            } else if (selectedType === 'destin') {
                html += `<div class="card-type">📜 Carte DESTIN</div>`;
                html += `<div class="card-text">Lancez la pièce pour connaître votre sort !</div>`;
                actionArea.dataset.pile = card.pile;
                actionArea.dataset.face = card.face;
            }
            display.innerHTML = html;

            if (selectedType !== 'destin') {
                const hideBtn = document.createElement('button');
                hideBtn.className = 'hide-btn';
                hideBtn.textContent = '🙈 Cacher la carte';
                hideBtn.addEventListener('click', clearCardDisplay);
                actionArea.appendChild(hideBtn);
            } else {
                const coinBtn = document.createElement('button');
                coinBtn.className = 'coin-btn';
                coinBtn.textContent = '🪙 Lancer la pièce';
                coinBtn.addEventListener('click', function() {
                    const isPile = Math.random() < 0.5;
                    const resultText = isPile ? 'PILE' : 'FACE';
                    const effect = isPile ? this.parentElement.dataset.pile : this.parentElement.dataset.face;
                    this.parentElement.innerHTML = `<div class="result-text">Résultat : <strong>${resultText}</strong> → ${effect}</div>`;
                    const hideBtn = document.createElement('button');
                    hideBtn.className = 'hide-btn';
                    hideBtn.textContent = '🙈 Cacher la carte';
                    hideBtn.addEventListener('click', clearCardDisplay);
                    this.parentElement.appendChild(hideBtn);
                });
                actionArea.appendChild(coinBtn);
            }

            if (navigator.vibrate) navigator.vibrate(100);
        }

        document.getElementById('drawButton').addEventListener('click', drawCard);
        document.getElementById('resetCurrent').addEventListener('click', () => {
            const type = document.querySelector('input[name="cardType"]:checked').value;
            resetPile(type);
        });
        document.getElementById('resetAll').addEventListener('click', () => resetPile('all'));

        updateCounters();
    </script>
</body>
</html>
